name: AI-SIEM CI
on:
  push:
  pull_request:
jobs:
  tests-and-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile Python modules
        run: python -m compileall backend tests
      - name: Run unit tests
        run: python -m unittest discover tests -v
        env:
          AI_SIEM_API_KEY: test-token
          AI_SIEM_RATE_LIMIT_PER_MINUTE: 1000
          AI_SIEM_INGEST_RATE_LIMIT_PER_MINUTE: 1000
      - name: Install security scanners
        run: pip install bandit pip-audit
      - name: Bandit high severity scan
        run: bandit -q -r backend -lll
      - name: Dependency vulnerability audit
        run: pip-audit -r requirements.txt
