services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      AI_SIEM_HOST: 0.0.0.0
      AI_SIEM_PORT: 8000
      AI_SIEM_ALLOWED_ORIGIN: http://localhost:5173
  frontend:
    image: node:22-alpine
    working_dir: /ui
    volumes:
      - ./frontend:/ui
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
