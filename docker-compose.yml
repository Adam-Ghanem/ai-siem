services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=dev
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
  frontend:
    image: node:22-alpine
    working_dir: /ui
    volumes:
      - ./frontend:/ui
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
